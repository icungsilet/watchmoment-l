<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Bule Edan</title>

<style>

*{box-sizing:border-box;margin:0;padding:0}

body{
background:#000;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.live-container{
width:100%;
max-width:430px;
aspect-ratio:9/16;
position:relative;
overflow:hidden;
border-radius:12px;
background:#000;
}

.live-video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

/* LIVE badge */

.live-badge{
position:absolute;
top:12px;
left:12px;
background:#ff0033;
color:#fff;
font-size:12px;
padding:4px 10px;
border-radius:6px;
font-weight:bold;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.4}
100%{opacity:1}
}

/* viewer */

.viewer{
position:absolute;
top:12px;
right:12px;
background:rgba(0,0,0,.6);
color:#fff;
padding:6px 10px;
border-radius:20px;
font-size:12px;
}

.viewer{
background:rgba(0,0,0,.6);
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* profile */

.header{
position:absolute;
top:45px;
left:10px;
display:flex;
align-items:center;
color:#fff;
}

.header img{
width:38px;
height:38px;
border-radius:50%;
border:2px solid #fff;
margin-right:8px;
}

/* chat */

.chat-box{
position:absolute;
bottom:120px;
left:10px;
width:70%;
max-height:170px;
overflow:hidden;
}

.chat-message{
background:rgba(0,0,0,.5);
color:#fff;
padding:6px 12px;
border-radius:20px;
font-size:13px;
margin-bottom:6px;
width:fit-content;
}

/* icons */

.live-icons{
position:absolute;
right:10px;
bottom:140px;
display:flex;
flex-direction:column;
gap:14px;
}

.live-icons img{
width:40px;
height:40px;
background:rgba(0,0,0,.6);
padding:8px;
border-radius:50%;
cursor:pointer;
}

/* hearts */

.hearts{
position:absolute;
bottom:100px;
right:20px;
pointer-events:none;
}

.heart{
position:absolute;
color:#ff2d55;
font-size:22px;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-260px);opacity:0}
}

/* gift */

.gift{
position:absolute;
bottom:200px;
left:10px;
background:linear-gradient(45deg,#ff3c5f,#ff7b8a);
color:#fff;
padding:6px 12px;
border-radius:20px;
font-size:12px;
display:none;
}

/* play */

.play-button{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.6);
border-radius:50%;
padding:20px;
cursor:pointer;
}

.play-button svg{
width:34px;
fill:#fff;
}

</style>
</head>

<body>

<div class="live-container">

<img class="live-video" src="https://icungsilet.github.io/watchmoment-l/valeri.jpg">

<div class="live-badge">LIVE</div>

<div class="viewer" id="viewer">30.3K watching</div>

<div class="header">
<img src="https://icungsilet.github.io/watchmoment-l/valeri2.jpg">
<div>Valarie Ruvalcaba</div>
</div>

<div class="chat-box" id="chat"></div>

<div class="gift" id="gift">🎁 Someone sent a gift</div>

<div class="live-icons">

<img src="https://cdn-icons-png.flaticon.com/512/833/833472.png">

<img src="https://cdn-icons-png.flaticon.com/512/3523/3523887.png">

</div>

<div class="hearts" id="hearts"></div>

<div class="play-button" onclick="openLink()">
<svg viewBox="0 0 24 24">
<path d="M8 5v14l11-7z"/>

</div>

</div>
